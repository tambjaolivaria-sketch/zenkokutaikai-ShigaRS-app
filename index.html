<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>滋賀RS会計システム-全国大会2026千葉</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d1d5db;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --danger-dark: #b91c1c;
      --ok: #16a34a;
      --ok-dark: #15803d;
      --orange: #f59e0b;
      --orange-dark: #d97706;
      --shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input {
      font: inherit;
    }

    button {
      border: none;
      cursor: pointer;
    }

    .app {
      width: 100vw;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
    }

    .header {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: var(--panel);
      border-radius: var(--radius);
      padding: 0 18px;
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    .title {
      font-size: clamp(18px, 2.4vw, 28px);
      font-weight: 900;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .record-count {
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 900;
      color: var(--primary);
      white-space: nowrap;
    }

    .screen {
      display: none;
    }

    .screen.active.main-screen {
      display: grid;
    }

    .screen.active.settings-screen {
      display: flex;
    }

    .main-screen {
      flex: 1;
      min-height: 0;
      grid-template-columns: minmax(420px, 1.45fr) minmax(270px, 0.85fr) minmax(300px, 1fr);
      gap: 10px;
    }

    .panel {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    .panel-title {
      font-size: clamp(18px, 1.8vw, 22px);
      font-weight: 900;
      line-height: 1.15;
      flex-shrink: 0;
    }

    .products {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .product-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 52px 86px;
      gap: 8px;
      height: calc((100% - 40px) / 5);
      min-height: 58px;
    }

    .product-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 16px;
      border-radius: 16px;
      background: #eef4ff;
      color: #123c7c;
      border: 2px solid #c7d9ff;
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.14);
      min-width: 0;
    }

    .product-main:active {
      transform: scale(0.99);
      background: #dbeafe;
    }

    .product-name {
      font-size: clamp(17px, 2vw, 24px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .product-price {
      font-size: clamp(16px, 1.8vw, 22px);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .times-block, .count-block {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      background: #f9fafb;
      border: 2px solid var(--line);
      font-weight: 900;
    }

    .times-block {
      font-size: clamp(20px, 2.3vw, 28px);
      color: var(--muted);
    }

    .count-block {
      font-size: clamp(17px, 2vw, 24px);
    }

    .summary-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      flex: 0 1 auto;
      min-height: 0;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      font-size: clamp(14px, 1.5vw, 18px);
      font-weight: 800;
      min-height: 36px;
    }

    .summary-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .summary-count {
      white-space: nowrap;
      flex-shrink: 0;
    }

    .amounts {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .amount-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: #f3f4f6;
      font-weight: 900;
      font-size: clamp(16px, 1.6vw, 20px);
      min-height: 46px;
    }

    .amount-box.paid {
      background: #ecfdf5;
      color: #065f46;
      border: 2px solid #a7f3d0;
      font-size: clamp(19px, 1.9vw, 24px);
      min-height: 52px;
    }

    .amount-box.discount {
      background: #fff7ed;
      color: #9a3412;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .action-button {
      min-height: 46px;
      border-radius: 14px;
      font-size: clamp(15px, 1.5vw, 19px);
      font-weight: 900;
      color: white;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.18);
    }

    .record-button {
      background: var(--ok);
      grid-column: span 2;
      min-height: 58px;
      font-size: clamp(21px, 2.2vw, 28px);
    }

    .record-button:active { background: var(--ok-dark); }
    .reset-button { background: var(--danger); }
    .reset-button:active { background: var(--danger-dark); }
    .cancel-button { background: #7c2d12; }
    .settings-button { background: #4b5563; }
    .csv-button { background: var(--primary); }
    .csv-button:active { background: var(--primary-dark); }
    .finish-button {
      background: var(--orange);
      grid-column: span 2;
    }
    .finish-button:active { background: var(--orange-dark); }

    .notice {
      min-height: 22px;
      font-size: clamp(13px, 1.4vw, 17px);
      font-weight: 800;
      color: var(--primary);
      line-height: 1.25;
    }

    .keypad-panel {
      gap: 10px;
    }

    .keypad-display-label {
      font-size: clamp(16px, 1.6vw, 20px);
      font-weight: 900;
      color: var(--muted);
      flex-shrink: 0;
    }

    .keypad-display {
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 18px;
      border-radius: 18px;
      background: #111827;
      color: white;
      font-size: clamp(32px, 4.2vw, 52px);
      font-weight: 900;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .key {
      min-height: 58px;
      border-radius: 18px;
      background: #ffffff;
      border: 2px solid var(--line);
      font-size: clamp(26px, 3.5vw, 44px);
      font-weight: 900;
      color: var(--text);
      box-shadow: 0 3px 8px rgba(15, 23, 42, 0.12);
    }

    .key:active {
      transform: scale(0.98);
      background: #e5e7eb;
    }

    .key.control {
      font-size: clamp(20px, 2.4vw, 30px);
      background: #fef3c7;
      border-color: #fcd34d;
    }

    .restore-button {
      min-height: 56px;
      border-radius: 18px;
      background: var(--primary);
      color: white;
      font-size: clamp(19px, 2.2vw, 26px);
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.22);
      flex-shrink: 0;
    }

    .settings-screen {
      flex: 1;
      min-height: 0;
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      flex-shrink: 0;
    }

    .settings-title {
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 900;
    }

    .settings-note {
      margin-top: 4px;
      font-size: clamp(15px, 1.6vw, 18px);
      font-weight: 800;
      color: var(--muted);
    }

    .settings-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 980px;
      min-height: 0;
      flex: 1;
    }

    .settings-row {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 190px 48px;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 16px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      min-height: 64px;
    }

    .settings-row input {
      height: 48px;
      border-radius: 14px;
      border: 2px solid var(--line);
      padding: 0 12px;
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 800;
      background: white;
      user-select: text;
    }

    .settings-name-input {
      text-align: left;
    }

    .settings-price-input {
      text-align: right;
    }

    .yen-label {
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 900;
    }

    .settings-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .settings-actions button {
      min-width: 160px;
      min-height: 56px;
      border-radius: 16px;
      color: white;
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.16);
    }

    .save-settings { background: var(--ok); }
    .back-button { background: #4b5563; }
    .danger-outline {
      color: var(--danger) !important;
      background: #fff !important;
      border: 2px solid var(--danger) !important;
      box-shadow: none !important;
    }

    @media (max-width: 980px) and (orientation: landscape) {
      .app { padding: 8px; gap: 8px; }
      .header { height: 48px; }
      .panel { padding: 10px; gap: 8px; }
      .main-screen {
        grid-template-columns: minmax(360px, 1.35fr) minmax(250px, 0.85fr) minmax(270px, 1fr);
        gap: 8px;
      }
      .product-row {
        grid-template-columns: minmax(0, 1fr) 44px 76px;
        gap: 6px;
      }
      .summary-item { padding: 6px 8px; min-height: 32px; }
      .amount-box { min-height: 40px; padding: 8px 10px; }
      .amount-box.paid { min-height: 46px; }
      .action-button { min-height: 40px; }
      .record-button { min-height: 50px; }
      .keypad-display { height: 66px; }
      .restore-button { min-height: 50px; }
    }

    @media (orientation: portrait) {
      body::before {
        content: "iPadを横向きにして使用してください";
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        background: #111827;
        color: #fff;
        font-size: 28px;
        font-weight: 900;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="title">滋賀RS会計システム-全国大会2026千葉</div>
      <div class="record-count" id="recordCount">記録件数：0件</div>
    </header>

    <main id="mainScreen" class="screen active main-screen">
      <section class="panel">
        <div class="panel-title">商品</div>
        <div class="products" id="productRows"></div>
      </section>

      <section class="panel">
        <div class="panel-title">今回の会計</div>
        <div class="summary-list" id="summaryList"></div>

        <div class="amounts">
          <div class="amount-box">
            <span>定価合計</span>
            <span id="regularTotal">0円</span>
          </div>
          <div class="amount-box paid">
            <span>会計金額</span>
            <span id="paidTotal">0円</span>
          </div>
          <div class="amount-box discount">
            <span>差額</span>
            <span id="discountTotal">0円</span>
          </div>
          <div class="actions">
            <button class="action-button record-button" id="recordButton">記録</button>
            <button class="action-button reset-button" id="resetButton">リセット</button>
            <button class="action-button cancel-button" id="cancelLastButton">直前取消</button>
            <button class="action-button settings-button" id="openSettingsButton">商品・価格設定</button>
            <button class="action-button csv-button" id="exportCsvButton">CSV出力</button>
            <button class="action-button finish-button" id="finishAccountingButton">会計終了</button>
          </div>
          <div class="notice" id="notice"></div>
        </div>
      </section>

      <section class="panel keypad-panel">
        <div class="keypad-display-label">合計金額入力</div>
        <div class="keypad-display" id="keypadDisplay">0円</div>
        <div class="keypad">
          <button class="key" data-key="1">1</button>
          <button class="key" data-key="2">2</button>
          <button class="key" data-key="3">3</button>
          <button class="key" data-key="4">4</button>
          <button class="key" data-key="5">5</button>
          <button class="key" data-key="6">6</button>
          <button class="key" data-key="7">7</button>
          <button class="key" data-key="8">8</button>
          <button class="key" data-key="9">9</button>
          <button class="key control" data-key="clear">C</button>
          <button class="key" data-key="0">0</button>
          <button class="key control" data-key="backspace">←</button>
        </div>
        <button class="restore-button" id="restoreRegularButton">定価に戻す</button>
      </section>
    </main>

    <section id="settingsScreen" class="screen settings-screen">
      <div class="settings-header">
        <div>
          <div class="settings-title">商品・価格設定</div>
          <div class="settings-note">商品名と価格を変更できます。保存後、次の会計から反映されます。</div>
        </div>
      </div>
      <div class="settings-list" id="settingsList"></div>
      <div class="settings-actions">
        <button class="danger-outline" id="clearAllButton">全データ削除</button>
        <button class="back-button" id="backButton">戻る</button>
        <button class="save-settings" id="saveSettingsButton">保存して戻る</button>
      </div>
    </section>
  </div>

  <script>
    const DEFAULT_PRODUCTS = [
      { id: "item1", name: "ワッペン1", price: 250 },
      { id: "item2", name: "ワッペン2", price: 250 },
      { id: "item3", name: "たぬきチーフリング青", price: 700 },
      { id: "item4", name: "たぬきチーフリング赤", price: 700 },
      { id: "item5", name: "「弥栄」日本手拭い", price: 700 }
    ];

    const STORAGE_KEYS = {
      products: "shiga_rs_pos_products_v2",
      records: "shiga_rs_pos_records_v2"
    };

    let products = loadProducts();
    let records = loadRecords();
    let counts = Object.fromEntries(products.map(product => [product.id, 0]));
    let paidInput = "";
    let manualPaid = false;

    const productRowsEl = document.getElementById("productRows");
    const summaryListEl = document.getElementById("summaryList");
    const regularTotalEl = document.getElementById("regularTotal");
    const paidTotalEl = document.getElementById("paidTotal");
    const discountTotalEl = document.getElementById("discountTotal");
    const keypadDisplayEl = document.getElementById("keypadDisplay");
    const recordCountEl = document.getElementById("recordCount");
    const noticeEl = document.getElementById("notice");
    const mainScreenEl = document.getElementById("mainScreen");
    const settingsScreenEl = document.getElementById("settingsScreen");
    const settingsListEl = document.getElementById("settingsList");

    document.getElementById("recordButton").addEventListener("click", recordSale);
    document.getElementById("resetButton").addEventListener("click", resetCurrentSale);
    document.getElementById("cancelLastButton").addEventListener("click", cancelLastRecord);
    document.getElementById("openSettingsButton").addEventListener("click", openSettings);
    document.getElementById("exportCsvButton").addEventListener("click", exportCsvOnly);
    document.getElementById("finishAccountingButton").addEventListener("click", finishAccounting);
    document.getElementById("restoreRegularButton").addEventListener("click", restoreRegularPrice);
    document.getElementById("backButton").addEventListener("click", closeSettingsWithoutSaving);
    document.getElementById("saveSettingsButton").addEventListener("click", saveSettingsAndReturn);
    document.getElementById("clearAllButton").addEventListener("click", clearAllData);

    document.querySelectorAll(".key").forEach(button => {
      button.addEventListener("click", () => handleKey(button.dataset.key));
    });

    renderAll();

    function loadProducts() {
      const saved = localStorage.getItem(STORAGE_KEYS.products);
      if (!saved) return DEFAULT_PRODUCTS.map(product => ({ ...product }));

      try {
        const parsed = JSON.parse(saved);
        return DEFAULT_PRODUCTS.map(defaultProduct => {
          const savedProduct = parsed.find(product => product.id === defaultProduct.id);
          return {
            ...defaultProduct,
            name: typeof savedProduct?.name === "string" && savedProduct.name.trim() ? savedProduct.name.trim() : defaultProduct.name,
            price: Number.isFinite(Number(savedProduct?.price)) ? Number(savedProduct.price) : defaultProduct.price
          };
        });
      } catch {
        return DEFAULT_PRODUCTS.map(product => ({ ...product }));
      }
    }

    function loadRecords() {
      const saved = localStorage.getItem(STORAGE_KEYS.records);
      if (!saved) return [];

      try {
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveProducts() {
      localStorage.setItem(STORAGE_KEYS.products, JSON.stringify(products));
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEYS.records, JSON.stringify(records));
    }

    function formatYen(value) {
      return `${Number(value || 0).toLocaleString("ja-JP")}円`;
    }

    function getRegularTotal() {
      return products.reduce((sum, product) => sum + product.price * counts[product.id], 0);
    }

    function getPaidTotal() {
      if (!manualPaid) return getRegularTotal();
      return Number(paidInput || 0);
    }

    function getDiscount() {
      return getRegularTotal() - getPaidTotal();
    }

    function getTotalCount() {
      return products.reduce((sum, product) => sum + counts[product.id], 0);
    }

    function renderAll() {
      renderProducts();
      renderSummary();
      renderAmounts();
      renderRecordCount();
    }

    function renderProducts() {
      productRowsEl.innerHTML = "";

      products.forEach(product => {
        const row = document.createElement("div");
        row.className = "product-row";

        const mainButton = document.createElement("button");
        mainButton.className = "product-main";
        mainButton.innerHTML = `
          <span class="product-name">${escapeHtml(product.name)}</span>
          <span class="product-price">${formatYen(product.price)}</span>
        `;
        mainButton.addEventListener("click", () => addProduct(product.id));

        const times = document.createElement("div");
        times.className = "times-block";
        times.textContent = "×";

        const count = document.createElement("div");
        count.className = "count-block";
        count.textContent = `${counts[product.id]}個`;

        row.appendChild(mainButton);
        row.appendChild(times);
        row.appendChild(count);
        productRowsEl.appendChild(row);
      });
    }

    function renderSummary() {
      summaryListEl.innerHTML = "";

      products.forEach(product => {
        const item = document.createElement("div");
        item.className = "summary-item";
        item.innerHTML = `
          <span class="summary-name">${escapeHtml(product.name)}</span>
          <span class="summary-count">${counts[product.id]}個</span>
        `;
        summaryListEl.appendChild(item);
      });
    }

    function renderAmounts() {
      const regularTotal = getRegularTotal();
      const paidTotal = getPaidTotal();
      const discount = getDiscount();

      regularTotalEl.textContent = formatYen(regularTotal);
      paidTotalEl.textContent = formatYen(paidTotal);
      discountTotalEl.textContent = formatYen(discount);
      keypadDisplayEl.textContent = formatYen(paidTotal);
    }

    function renderRecordCount() {
      recordCountEl.textContent = `記録件数：${records.length}件`;
    }

    function addProduct(productId) {
      counts[productId] += 1;
      showNotice("");
      renderAll();
    }

    function handleKey(key) {
      manualPaid = true;

      if (key === "clear") {
        paidInput = "";
      } else if (key === "backspace") {
        paidInput = paidInput.slice(0, -1);
      } else {
        if (paidInput.length < 7) {
          paidInput += key;
          paidInput = String(Number(paidInput || 0));
        }
      }

      renderAmounts();
    }

    function restoreRegularPrice() {
      manualPaid = false;
      paidInput = "";
      renderAmounts();
      showNotice("会計金額を定価合計に戻しました。", 1200);
    }

    function resetCurrentSale() {
      counts = Object.fromEntries(products.map(product => [product.id, 0]));
      manualPaid = false;
      paidInput = "";
      showNotice("今回の会計をリセットしました。", 1200);
      renderAll();
    }

    function recordSale() {
      if (getTotalCount() === 0) {
        showNotice("商品が選択されていません。", 1600);
        return;
      }

      const regularTotal = getRegularTotal();
      const paidTotal = getPaidTotal();
      const items = products.map(product => ({
        id: product.id,
        name: product.name,
        count: counts[product.id],
        price: product.price
      }));

      const record = {
        datetime: formatDatetime(new Date()),
        items,
        regularTotal,
        paidTotal,
        discount: regularTotal - paidTotal
      };

      records.push(record);
      saveRecords();
      resetCurrentSale();
      showNotice("記録しました。", 1400);
      renderRecordCount();
    }

    function cancelLastRecord() {
      if (records.length === 0) {
        showNotice("取り消す記録がありません。", 1600);
        return;
      }

      const lastRecord = records[records.length - 1];
      const message = buildCancelMessage(lastRecord);
      const confirmed = confirm(message);

      if (!confirmed) {
        showNotice("取消を中止しました。", 1200);
        return;
      }

      records.pop();
      saveRecords();
      renderRecordCount();
      showNotice("直前の記録を取り消しました。", 1600);
    }

    function buildCancelMessage(record) {
      const lines = ["以下の記録を取り消しますか？", ""];
      record.items.forEach(item => {
        if (item.count > 0) {
          lines.push(`${item.name}：${item.count}個 × ${item.price}円`);
        }
      });
      lines.push("");
      lines.push(`定価合計：${record.regularTotal}円`);
      lines.push(`会計金額：${record.paidTotal}円`);
      lines.push(`差額：${record.discount}円`);
      lines.push("");
      lines.push("取り消す場合はOK、やめる場合はキャンセルを押してください。");
      return lines.join("
");
    }

    function openSettings() {
      renderSettings();
      mainScreenEl.classList.remove("active");
      settingsScreenEl.classList.add("active");
    }

    function closeSettingsWithoutSaving() {
      settingsScreenEl.classList.remove("active");
      mainScreenEl.classList.add("active");
      showNotice("設定を保存せずに戻りました。", 1400);
    }

    function renderSettings() {
      settingsListEl.innerHTML = "";

      products.forEach(product => {
        const row = document.createElement("div");
        row.className = "settings-row";
        row.innerHTML = `
          <input class="settings-name-input" type="text" value="${escapeHtml(product.name)}" data-name-id="${product.id}" />
          <input class="settings-price-input" type="number" min="0" step="1" inputmode="numeric" value="${product.price}" data-price-id="${product.id}" />
          <div class="yen-label">円</div>
        `;
        settingsListEl.appendChild(row);
      });
    }

    function saveSettingsAndReturn() {
      const nameInputs = settingsListEl.querySelectorAll("input[data-name-id]");
      const priceInputs = settingsListEl.querySelectorAll("input[data-price-id]");
      const newNames = {};
      const newPrices = {};

      for (const input of nameInputs) {
        const name = input.value.trim();
        if (!name) {
          alert("商品名は空欄にできません。");
          return;
        }
        newNames[input.dataset.nameId] = name;
      }

      for (const input of priceInputs) {
        const value = Number(input.value);
        if (!Number.isFinite(value) || value < 0) {
          alert("価格は0円以上の数字で入力してください。");
          return;
        }
        newPrices[input.dataset.priceId] = Math.round(value);
      }

      products = products.map(product => ({
        ...product,
        name: newNames[product.id],
        price: newPrices[product.id]
      }));

      counts = Object.fromEntries(products.map(product => [product.id, counts[product.id] || 0]));
      saveProducts();
      manualPaid = false;
      paidInput = "";

      settingsScreenEl.classList.remove("active");
      mainScreenEl.classList.add("active");
      renderAll();
      showNotice("商品名と価格を保存しました。", 1400);
    }

    function exportCsvOnly() {
      const ok = exportCsv("滋賀RS会計_通常出力");
      if (ok) showNotice("CSVを出力しました。記録は残っています。", 1800);
    }

    function finishAccounting() {
      if (records.length === 0) {
        showNotice("終了する記録がありません。", 1600);
        return;
      }

      const confirmed = confirm("現在の記録をCSV出力し、記録件数を0件に戻します。よろしいですか？");
      if (!confirmed) return;

      const ok = exportCsv("滋賀RS会計_会計終了");
      if (!ok) return;

      records = [];
      saveRecords();
      resetCurrentSale();
      renderRecordCount();
      showNotice("会計を終了しました。記録件数を0件に戻しました。", 2200);
    }

    function exportCsv(prefix) {
      if (records.length === 0) {
        showNotice("出力する記録がありません。", 1600);
        return false;
      }

      const productIds = DEFAULT_PRODUCTS.map(product => product.id);
      const latestNamesById = Object.fromEntries(products.map(product => [product.id, product.name]));

      const headers = ["日時"];
      productIds.forEach(productId => {
        const label = latestNamesById[productId] || productId;
        headers.push(`${label}_商品名`, `${label}_個数`, `${label}_単価`);
      });
      headers.push("定価合計", "会計金額", "差額");

      const rows = records.map(record => {
        const row = [record.datetime];
        productIds.forEach(productId => {
          const item = record.items.find(recordItem => recordItem.id === productId);
          row.push(item?.name ?? "", item?.count ?? 0, item?.price ?? 0);
        });
        row.push(record.regularTotal, record.paidTotal, record.discount);
        return row;
      });

      const csv = [headers, ...rows]
        .map(row => row.map(value => csvEscape(value)).join(","))
        .join("
");

      const bom = "﻿";
      const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const now = new Date();
      const stamp = buildFileStamp(now);

      link.href = url;
      link.download = `${prefix}_${stamp}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      return true;
    }

    function clearAllData() {
      const confirmed = confirm("保存済みの売上記録と商品・価格設定をすべて削除します。よろしいですか？");
      if (!confirmed) return;

      localStorage.removeItem(STORAGE_KEYS.products);
      localStorage.removeItem(STORAGE_KEYS.records);
      products = DEFAULT_PRODUCTS.map(product => ({ ...product }));
      records = [];
      counts = Object.fromEntries(products.map(product => [product.id, 0]));
      manualPaid = false;
      paidInput = "";
      saveProducts();
      saveRecords();

      settingsScreenEl.classList.remove("active");
      mainScreenEl.classList.add("active");
      renderAll();
      showNotice("全データを削除しました。", 1800);
    }

    function formatDatetime(date) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mi = String(date.getMinutes()).padStart(2, "0");
      const ss = String(date.getSeconds()).padStart(2, "0");
      return `${yyyy}/${mm}/${dd} ${hh}:${mi}:${ss}`;
    }

    function buildFileStamp(date) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mi = String(date.getMinutes()).padStart(2, "0");
      return `${yyyy}${mm}${dd}_${hh}${mi}`;
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      if (text.includes(",") || text.includes("\"") || text.includes("
")) {
        return `"${text.replaceAll("\"", "\"\"")}"`;
      }
      return text;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showNotice(message, duration = 0) {
      noticeEl.textContent = message;
      if (duration > 0) {
        setTimeout(() => {
          if (noticeEl.textContent === message) noticeEl.textContent = "";
        }, duration);
      }
    }
  </script>
