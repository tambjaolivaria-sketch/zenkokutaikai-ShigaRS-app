<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>滋賀RS会計システム-全国大会2026千葉</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d1d5db;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --brown: #7c2d12;
      --orange: #f59e0b;
      --dark: #111827;
      --shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input {
      font: inherit;
    }

    button {
      border: none;
      cursor: pointer;
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
    }

    .header {
      height: 54px;
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      gap: 14px;
      flex-shrink: 0;
    }

    .title {
      font-size: 28px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .record-count {
      color: var(--blue);
      font-size: 24px;
      font-weight: 900;
      white-space: nowrap;
    }

    .main-screen {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1.45fr 0.85fr 1fr;
      gap: 10px;
    }

    .panel {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    .panel-title {
      font-size: 22px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .products {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .product-row {
      flex: 1;
      min-height: 56px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 52px 86px;
      gap: 8px;
    }

    .product-main {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 16px;
      border-radius: 16px;
      background: #eef4ff;
      color: #123c7c;
      border: 2px solid #c7d9ff;
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.14);
    }

    .product-main:active, .key:active, .action-button:active, .restore-button:active {
      transform: scale(0.98);
    }

    .product-name {
      font-size: 24px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .product-price {
      font-size: 22px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .times-block, .count-block {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      background: #f9fafb;
      border: 2px solid var(--line);
      font-weight: 900;
    }

    .times-block {
      font-size: 28px;
      color: var(--muted);
    }

    .count-block {
      font-size: 24px;
    }

    .summary-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-height: 0;
    }

    .summary-item {
      min-height: 36px;
      padding: 8px 10px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 800;
    }

    .summary-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .summary-count {
      white-space: nowrap;
      flex-shrink: 0;
    }

    .amounts {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .amount-box {
      min-height: 46px;
      border-radius: 14px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      font-size: 20px;
      font-weight: 900;
    }

    .amount-box.paid {
      min-height: 52px;
      background: #ecfdf5;
      border: 2px solid #a7f3d0;
      color: #065f46;
      font-size: 24px;
    }

    .amount-box.discount {
      background: #fff7ed;
      color: #9a3412;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .action-button {
      min-height: 46px;
      border-radius: 14px;
      color: white;
      font-size: 18px;
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.18);
    }

    .record-button {
      grid-column: span 2;
      min-height: 58px;
      background: var(--green);
      font-size: 28px;
    }

    .reset-button { background: var(--red); }
    .cancel-button { background: var(--brown); }
    .settings-button { background: #4b5563; }
    .csv-button { background: var(--blue); }
    .finish-button {
      grid-column: span 2;
      background: var(--orange);
    }

    .notice {
      min-height: 22px;
      font-size: 16px;
      font-weight: 800;
      color: var(--blue);
    }

    .keypad-display-label {
      font-size: 20px;
      font-weight: 900;
      color: var(--muted);
      flex-shrink: 0;
    }

    .keypad-display {
      height: 76px;
      border-radius: 18px;
      background: var(--dark);
      color: white;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 18px;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .keypad {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .key {
      min-height: 58px;
      border-radius: 18px;
      background: white;
      border: 2px solid var(--line);
      font-size: 44px;
      font-weight: 900;
      color: var(--text);
      box-shadow: 0 3px 8px rgba(15, 23, 42, 0.12);
    }

    .key.control {
      font-size: 30px;
      background: #fef3c7;
      border-color: #fcd34d;
    }

    .restore-button {
      min-height: 56px;
      border-radius: 18px;
      background: var(--blue);
      color: white;
      font-size: 26px;
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.22);
      flex-shrink: 0;
    }

    .settings-screen {
      flex: 1;
      min-height: 0;
      display: none;
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .settings-title {
      font-size: 34px;
      font-weight: 900;
    }

    .settings-note {
      margin-top: 4px;
      font-size: 18px;
      font-weight: 800;
      color: var(--muted);
    }

    .settings-list {
      flex: 1;
      min-height: 0;
      max-width: 980px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .settings-row {
      min-height: 64px;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 190px 48px;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 16px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }

    .settings-row input {
      height: 48px;
      border-radius: 14px;
      border: 2px solid var(--line);
      padding: 0 12px;
      font-size: 24px;
      font-weight: 800;
      background: white;
      user-select: text;
    }

    .settings-price-input {
      text-align: right;
    }

    .yen-label {
      font-size: 22px;
      font-weight: 900;
    }

    .settings-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .settings-actions button {
      min-width: 160px;
      min-height: 56px;
      border-radius: 16px;
      color: white;
      font-size: 24px;
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.16);
    }

    .save-settings { background: var(--green); }
    .back-button { background: #4b5563; }
    .danger-outline {
      color: var(--red) !important;
      background: white !important;
      border: 2px solid var(--red) !important;
      box-shadow: none !important;
    }

    @media (max-width: 980px) and (orientation: landscape) {
      .app { padding: 8px; gap: 8px; }
      .header { height: 48px; }
      .title { font-size: 22px; }
      .record-count { font-size: 20px; }
      .panel { padding: 10px; gap: 8px; }
      .main-screen { grid-template-columns: 1.35fr 0.85fr 1fr; gap: 8px; }
      .product-row { grid-template-columns: minmax(0, 1fr) 44px 76px; gap: 6px; }
      .product-name { font-size: 18px; }
      .product-price { font-size: 18px; }
      .summary-item { padding: 6px 8px; min-height: 32px; font-size: 15px; }
      .amount-box { min-height: 40px; padding: 8px 10px; font-size: 17px; }
      .amount-box.paid { min-height: 46px; font-size: 20px; }
      .action-button { min-height: 40px; font-size: 16px; }
      .record-button { min-height: 50px; font-size: 24px; }
      .keypad-display { height: 66px; font-size: 40px; }
      .key { font-size: 34px; }
      .key.control { font-size: 24px; }
      .restore-button { min-height: 50px; font-size: 22px; }
    }

    @media (orientation: portrait) {
      body::before {
        content: "iPadを横向きにして使用してください";
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        background: #111827;
        color: white;
        font-size: 28px;
        font-weight: 900;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="title">滋賀RS会計システム-全国大会2026千葉</div>
      <div class="record-count" id="recordCount">記録件数：0件</div>
    </header>

    <main id="mainScreen" class="main-screen">
      <section class="panel">
        <div class="panel-title">商品</div>
        <div class="products">
          <div class="product-row">
            <button class="product-main" onclick="addProduct(0)"><span class="product-name" id="pName0">ワッペン1</span><span class="product-price" id="pPrice0">250円</span></button>
            <div class="times-block">×</div><div class="count-block" id="pCount0">0個</div>
          </div>
          <div class="product-row">
            <button class="product-main" onclick="addProduct(1)"><span class="product-name" id="pName1">ワッペン2</span><span class="product-price" id="pPrice1">250円</span></button>
            <div class="times-block">×</div><div class="count-block" id="pCount1">0個</div>
          </div>
          <div class="product-row">
            <button class="product-main" onclick="addProduct(2)"><span class="product-name" id="pName2">たぬきチーフリング青</span><span class="product-price" id="pPrice2">700円</span></button>
            <div class="times-block">×</div><div class="count-block" id="pCount2">0個</div>
          </div>
          <div class="product-row">
            <button class="product-main" onclick="addProduct(3)"><span class="product-name" id="pName3">たぬきチーフリング赤</span><span class="product-price" id="pPrice3">700円</span></button>
            <div class="times-block">×</div><div class="count-block" id="pCount3">0個</div>
          </div>
          <div class="product-row">
            <button class="product-main" onclick="addProduct(4)"><span class="product-name" id="pName4">「弥栄」日本手拭い</span><span class="product-price" id="pPrice4">700円</span></button>
            <div class="times-block">×</div><div class="count-block" id="pCount4">0個</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">今回の会計</div>
        <div class="summary-list">
          <div class="summary-item"><span class="summary-name" id="sName0">ワッペン1</span><span class="summary-count" id="sCount0">0個</span></div>
          <div class="summary-item"><span class="summary-name" id="sName1">ワッペン2</span><span class="summary-count" id="sCount1">0個</span></div>
          <div class="summary-item"><span class="summary-name" id="sName2">たぬきチーフリング青</span><span class="summary-count" id="sCount2">0個</span></div>
          <div class="summary-item"><span class="summary-name" id="sName3">たぬきチーフリング赤</span><span class="summary-count" id="sCount3">0個</span></div>
          <div class="summary-item"><span class="summary-name" id="sName4">「弥栄」日本手拭い</span><span class="summary-count" id="sCount4">0個</span></div>
        </div>
        <div class="amounts">
          <div class="amount-box"><span>定価合計</span><span id="regularTotal">0円</span></div>
          <div class="amount-box paid"><span>会計金額</span><span id="paidTotal">0円</span></div>
          <div class="amount-box discount"><span>差額</span><span id="discountTotal">0円</span></div>
          <div class="actions">
            <button class="action-button record-button" onclick="recordSale()">記録</button>
            <button class="action-button reset-button" onclick="resetCurrentSale()">リセット</button>
            <button class="action-button cancel-button" onclick="cancelLastRecord()">直前取消</button>
            <button class="action-button settings-button" onclick="openSettings()">商品・価格設定</button>
            <button class="action-button csv-button" onclick="exportCsvOnly()">CSV出力</button>
            <button class="action-button finish-button" onclick="finishAccounting()">会計終了</button>
          </div>
          <div class="notice" id="notice">起動中...</div>
        </div>
      </section>

      <section class="panel keypad-panel">
        <div class="keypad-display-label">合計金額入力</div>
        <div class="keypad-display" id="keypadDisplay">0円</div>
        <div class="keypad">
          <button class="key" onclick="handleKey('1')">1</button>
          <button class="key" onclick="handleKey('2')">2</button>
          <button class="key" onclick="handleKey('3')">3</button>
          <button class="key" onclick="handleKey('4')">4</button>
          <button class="key" onclick="handleKey('5')">5</button>
          <button class="key" onclick="handleKey('6')">6</button>
          <button class="key" onclick="handleKey('7')">7</button>
          <button class="key" onclick="handleKey('8')">8</button>
          <button class="key" onclick="handleKey('9')">9</button>
          <button class="key control" onclick="handleKey('clear')">C</button>
          <button class="key" onclick="handleKey('0')">0</button>
          <button class="key control" onclick="handleKey('backspace')">←</button>
        </div>
        <button class="restore-button" onclick="restoreRegularPrice()">定価に戻す</button>
      </section>
    </main>

    <section id="settingsScreen" class="settings-screen">
      <div>
        <div class="settings-title">商品・価格設定</div>
        <div class="settings-note">商品名と価格を変更できます。保存後、次の会計から反映されます。</div>
      </div>
      <div class="settings-list">
        <div class="settings-row"><input id="setName0" type="text"><input class="settings-price-input" id="setPrice0" type="number" min="0" step="1"><div class="yen-label">円</div></div>
        <div class="settings-row"><input id="setName1" type="text"><input class="settings-price-input" id="setPrice1" type="number" min="0" step="1"><div class="yen-label">円</div></div>
        <div class="settings-row"><input id="setName2" type="text"><input class="settings-price-input" id="setPrice2" type="number" min="0" step="1"><div class="yen-label">円</div></div>
        <div class="settings-row"><input id="setName3" type="text"><input class="settings-price-input" id="setPrice3" type="number" min="0" step="1"><div class="yen-label">円</div></div>
        <div class="settings-row"><input id="setName4" type="text"><input class="settings-price-input" id="setPrice4" type="number" min="0" step="1"><div class="yen-label">円</div></div>
      </div>
      <div class="settings-actions">
        <button class="danger-outline" onclick="clearAllData()">全データ削除</button>
        <button class="back-button" onclick="closeSettingsWithoutSaving()">戻る</button>
        <button class="save-settings" onclick="saveSettingsAndReturn()">保存して戻る</button>
      </div>
    </section>
  </div>

  <script>
    window.onerror = function(message, source, line) {
      alert('JavaScriptエラー: ' + message + ' 行:' + line);
      return false;
    };

    var STORAGE_PRODUCTS = 'shiga_rs_products_static_v1';
    var STORAGE_RECORDS = 'shiga_rs_records_static_v1';

    var products = [
      { id: 'item1', name: 'ワッペン1', price: 250 },
      { id: 'item2', name: 'ワッペン2', price: 250 },
      { id: 'item3', name: 'たぬきチーフリング青', price: 700 },
      { id: 'item4', name: 'たぬきチーフリング赤', price: 700 },
      { id: 'item5', name: '「弥栄」日本手拭い', price: 700 }
    ];

    var counts = [0, 0, 0, 0, 0];
    var records = [];
    var paidInput = '';
    var manualPaid = false;
    var noticeTimer = null;

    initApp();

    function initApp() {
      loadProducts();
      loadRecords();
      updateScreen();
      showNotice('起動しました。', 1200);
    }

    function loadProducts() {
      var saved = null;
      try { saved = localStorage.getItem(STORAGE_PRODUCTS); } catch (e) {}
      if (!saved) return;
      try {
        var parsed = JSON.parse(saved);
        for (var i = 0; i < products.length; i++) {
          if (parsed[i] && parsed[i].name) products[i].name = String(parsed[i].name);
          if (parsed[i] && !isNaN(Number(parsed[i].price))) products[i].price = Number(parsed[i].price);
        }
      } catch (e) {}
    }

    function loadRecords() {
      var saved = null;
      try { saved = localStorage.getItem(STORAGE_RECORDS); } catch (e) {}
      if (!saved) return;
      try {
        var parsed = JSON.parse(saved);
        if (parsed && parsed.length) records = parsed;
      } catch (e) {}
    }

    function saveProducts() {
      try { localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(products)); } catch (e) {}
    }

    function saveRecords() {
      try { localStorage.setItem(STORAGE_RECORDS, JSON.stringify(records)); } catch (e) {}
    }

    function updateScreen() {
      for (var i = 0; i < products.length; i++) {
        text('pName' + i, products[i].name);
        text('pPrice' + i, yen(products[i].price));
        text('pCount' + i, counts[i] + '個');
        text('sName' + i, products[i].name);
        text('sCount' + i, counts[i] + '個');
      }

      var regular = getRegularTotal();
      var paid = manualPaid ? Number(paidInput || 0) : regular;

      text('regularTotal', yen(regular));
      text('paidTotal', yen(paid));
      text('discountTotal', yen(regular - paid));
      text('keypadDisplay', yen(paid));
      text('recordCount', '記録件数：' + records.length + '件');
    }

    function text(id, value) {
      var el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function yen(value) {
      return Number(value || 0).toLocaleString('ja-JP') + '円';
    }

    function getRegularTotal() {
      var sum = 0;
      for (var i = 0; i < products.length; i++) sum += products[i].price * counts[i];
      return sum;
    }

    function getTotalCount() {
      var sum = 0;
      for (var i = 0; i < counts.length; i++) sum += counts[i];
      return sum;
    }

    function addProduct(index) {
      counts[index] += 1;
      showNotice('');
      updateScreen();
    }

    function handleKey(key) {
      manualPaid = true;
      if (key === 'clear') {
        paidInput = '';
      } else if (key === 'backspace') {
        paidInput = paidInput.slice(0, -1);
      } else if (paidInput.length < 7) {
        paidInput = String(Number(paidInput + key));
      }
      updateScreen();
    }

    function restoreRegularPrice() {
      manualPaid = false;
      paidInput = '';
      updateScreen();
      showNotice('会計金額を定価合計に戻しました。', 1200);
    }

    function resetCurrentSale() {
      counts = [0, 0, 0, 0, 0];
      manualPaid = false;
      paidInput = '';
      updateScreen();
      showNotice('今回の会計をリセットしました。', 1200);
    }

    function recordSale() {
      if (getTotalCount() === 0) {
        showNotice('商品が選択されていません。', 1600);
        return;
      }

      var regular = getRegularTotal();
      var paid = manualPaid ? Number(paidInput || 0) : regular;
      var items = [];

      for (var i = 0; i < products.length; i++) {
        items.push({
          id: products[i].id,
          name: products[i].name,
          count: counts[i],
          price: products[i].price
        });
      }

      records.push({
        datetime: formatDatetime(new Date()),
        items: items,
        regularTotal: regular,
        paidTotal: paid,
        discount: regular - paid
      });

      saveRecords();
      resetCurrentSale();
      updateScreen();
      showNotice('記録しました。', 1400);
    }

    function cancelLastRecord() {
      if (records.length === 0) {
        showNotice('取り消す記録がありません。', 1600);
        return;
      }
      var msg = buildCancelMessage(records[records.length - 1]);
      if (!confirm(msg)) return;
      records.pop();
      saveRecords();
      updateScreen();
      showNotice('直前の記録を取り消しました。', 1600);
    }

    function buildCancelMessage(record) {
      var lines = ['以下の記録を取り消しますか？', ''];
      for (var i = 0; i < record.items.length; i++) {
        var item = record.items[i];
        if (item.count > 0) lines.push(item.name + '：' + item.count + '個 × ' + item.price + '円');
      }
      lines.push('', '定価合計：' + record.regularTotal + '円', '会計金額：' + record.paidTotal + '円', '差額：' + record.discount + '円', '', '取り消す場合はOK、やめる場合はキャンセルを押してください。');
      return lines.join('\n');
    }

    function openSettings() {
      for (var i = 0; i < products.length; i++) {
        document.getElementById('setName' + i).value = products[i].name;
        document.getElementById('setPrice' + i).value = products[i].price;
      }
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('settingsScreen').style.display = 'flex';
    }

    function closeSettingsWithoutSaving() {
      document.getElementById('settingsScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'grid';
      showNotice('設定を保存せずに戻りました。', 1200);
    }

    function saveSettingsAndReturn() {
      for (var i = 0; i < products.length; i++) {
        var name = document.getElementById('setName' + i).value.replace(/^\s+|\s+$/g, '');
        var price = Number(document.getElementById('setPrice' + i).value);
        if (!name) {
          alert('商品名は空欄にできません。');
          return;
        }
        if (isNaN(price) || price < 0) {
          alert('価格は0円以上の数字で入力してください。');
          return;
        }
        products[i].name = name;
        products[i].price = Math.round(price);
      }
      saveProducts();
      closeSettingsWithoutSaving();
      updateScreen();
      showNotice('商品名と価格を保存しました。', 1400);
    }

    function exportCsvOnly() {
      if (exportCsv('滋賀RS会計_通常出力')) {
        showNotice('CSVを出力しました。記録は残っています。', 1800);
      }
    }

    function finishAccounting() {
      if (records.length === 0) {
        showNotice('終了する記録がありません。', 1600);
        return;
      }
      if (!confirm('現在の記録をCSV出力し、記録件数を0件に戻します。よろしいですか？')) return;
      if (!exportCsv('滋賀RS会計_会計終了')) return;
      records = [];
      saveRecords();
      resetCurrentSale();
      updateScreen();
      showNotice('会計を終了しました。記録件数を0件に戻しました。', 2200);
    }

    function exportCsv(prefix) {
      if (records.length === 0) {
        showNotice('出力する記録がありません。', 1600);
        return false;
      }

      var headers = ['日時'];
      for (var i = 0; i < products.length; i++) {
        headers.push(products[i].name + '_商品名');
        headers.push(products[i].name + '_個数');
        headers.push(products[i].name + '_単価');
      }
      headers.push('定価合計');
      headers.push('会計金額');
      headers.push('差額');

      var lines = [csvLine(headers)];

      for (var r = 0; r < records.length; r++) {
        var row = [records[r].datetime];
        for (var p = 0; p < products.length; p++) {
          var item = findRecordItem(records[r].items, products[p].id);
          row.push(item ? item.name : '');
          row.push(item ? item.count : 0);
          row.push(item ? item.price : 0);
        }
        row.push(records[r].regularTotal);
        row.push(records[r].paidTotal);
        row.push(records[r].discount);
        lines.push(csvLine(row));
      }

      var blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var link = document.createElement('a');
      link.href = url;
      link.download = prefix + '_' + buildFileStamp(new Date()) + '.csv';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      return true;
    }

    function findRecordItem(items, id) {
      for (var i = 0; i < items.length; i++) {
        if (items[i].id === id) return items[i];
      }
      return null;
    }

    function csvLine(row) {
      var arr = [];
      for (var i = 0; i < row.length; i++) arr.push(csvEscape(row[i]));
      return arr.join(',');
    }

    function csvEscape(value) {
      var text = String(value == null ? '' : value);
      if (text.indexOf(',') >= 0 || text.indexOf('"') >= 0 || text.indexOf('\n') >= 0 || text.indexOf('\r') >= 0) {
        return '"' + text.replace(/"/g, '""') + '"';
      }
      return text;
    }

    function clearAllData() {
      if (!confirm('保存済みの売上記録と商品・価格設定をすべて削除します。よろしいですか？')) return;
      try {
        localStorage.removeItem(STORAGE_PRODUCTS);
        localStorage.removeItem(STORAGE_RECORDS);
      } catch (e) {}
      products = [
        { id: 'item1', name: 'ワッペン1', price: 250 },
        { id: 'item2', name: 'ワッペン2', price: 250 },
        { id: 'item3', name: 'たぬきチーフリング青', price: 700 },
        { id: 'item4', name: 'たぬきチーフリング赤', price: 700 },
        { id: 'item5', name: '「弥栄」日本手拭い', price: 700 }
      ];
      records = [];
      counts = [0, 0, 0, 0, 0];
      manualPaid = false;
      paidInput = '';
      saveProducts();
      saveRecords();
      document.getElementById('settingsScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'grid';
      updateScreen();
      showNotice('全データを削除しました。', 1800);
    }

    function formatDatetime(date) {
      return date.getFullYear() + '/' + pad2(date.getMonth() + 1) + '/' + pad2(date.getDate()) + ' ' + pad2(date.getHours()) + ':' + pad2(date.getMinutes()) + ':' + pad2(date.getSeconds());
    }

    function buildFileStamp(date) {
      return String(date.getFullYear()) + pad2(date.getMonth() + 1) + pad2(date.getDate()) + '_' + pad2(date.getHours()) + pad2(date.getMinutes());
    }

    function pad2(value) {
      value = String(value);
      return value.length < 2 ? '0' + value : value;
    }

    function showNotice(message, duration) {
      var el = document.getElementById('notice');
      if (!el) return;
      el.textContent = message;
      if (noticeTimer) clearTimeout(noticeTimer);
      if (duration) {
        noticeTimer = setTimeout(function() { el.textContent = ''; }, duration);
      }
    }
  </script>
</body>
</html>
